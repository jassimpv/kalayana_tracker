<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kalyana Expense Tracker helps couples plan wedding expenses, purchases, reminders, and profile details in one Firebase-backed app.">
  <meta name="keywords" content="Kalyana, wedding expense tracker, marriage expense tracker, wedding planner, expense manager, reminders">
  <meta name="author" content="Kalyana Expense Tracker">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#06373B">
  <meta name="color-scheme" content="light dark">

  <!-- Open Graph / social previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kalyana Expense Tracker">
  <meta property="og:description" content="Plan wedding expenses, purchases, and reminders in one simple tracker.">
  <meta property="og:image" content="favicon/web-app-manifest-512x512.png">
  <meta property="og:site_name" content="Kalyana Expense Tracker">

  <!-- Twitter / X preview -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kalyana Expense Tracker">
  <meta name="twitter:description" content="Plan wedding expenses, purchases, and reminders in one simple tracker.">
  <meta name="twitter:image" content="favicon/web-app-manifest-512x512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kalyana Expense Tracker">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" href="favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">

  <title>Kalyana Expense Tracker</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <noscript>
    Kalyana Expense Tracker needs JavaScript enabled to run the wedding expense planner.
  </noscript>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
