<html>

<head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">

  <meta name="description" content="Marriage expense, date reminder, and invite tracker.">

  <meta name="google-signin-client_id"
    content="1097547412500-kghp41ghv639fqkujrhc91vgpio1cro5.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="apple-mobile-web-app-title" content="Kalyana Tracker">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- <link rel="apple-touch-icon" href="icons/Icon-192.png"> -->

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Kalyana Expense Tracker</title>

  <!-- <link rel="manifest" href="manifest.json"> -->

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    /* INSTALL MODAL */

    #installModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding:
        max(20px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    }

    .install-box {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: popupScale 0.25s ease;
    }

    @keyframes popupScale {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .install-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .install-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .install-title {
      font-size: 22px;
      font-weight: 700;
      color: #7A1F2B;
      margin-bottom: 10px;
    }

    .install-subtitle {
      font-size: 14px;
      line-height: 1.6;
      color: #666666;
      margin-bottom: 24px;
    }

    .install-steps {
      display: none;
      margin: 0 0 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f3fbfa;
      color: #124c49;
      font-size: 14px;
      line-height: 1.55;
      text-align: left;
    }

    .install-steps strong {
      color: #0f3f3d;
    }

    .install-actions {
      display: flex;
      gap: 12px;
    }

    .install-actions button {
      flex: 1;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #closeInstallBtn {
      background: #f2f2f2;
      color: #333333;
    }

    #closeInstallBtn:hover {
      background: #e5e5e5;
    }

    #installBtn {
      background: linear-gradient(135deg,
          #7A1F2B,
          #B76E79);
      color: #ffffff;
    }

    #installBtn:hover {
      opacity: 0.92;
    }
  </style>
  
  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
  <link rel="shortcut icon" href="favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="kalayana Expense Tracker" />
  <link rel="manifest" href="manifest.json" />
</head>

<body>

  <div id="installModal" role="dialog" aria-modal="true" aria-labelledby="installTitle">
    <div class="install-box">
      <div class="install-logo">
        <img src="favicon/apple-touch-icon.png" alt="">
      </div>
      <div id="installTitle" class="install-title">Add to Home Screen</div>
      <div id="installSubtitle" class="install-subtitle">
        Open Kalyana Expense Tracker in full screen from your phone home screen.
      </div>
      <div id="iosInstallSteps" class="install-steps">
        <strong>On iPhone Safari:</strong><br>
        Tap the share button, then choose <strong>Add to Home Screen</strong>.
      </div>
      <div class="install-actions">
        <button id="closeInstallBtn" type="button">Later</button>
        <button id="installBtn" type="button">Install</button>
      </div>
    </div>
  </div>

  <!-- Flutter -->

  <script>
    (function () {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      var refreshedKey = 'kalyana-pwa-refreshed-for-sw';

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (window.sessionStorage.getItem(refreshedKey) === 'true') {
          return;
        }

        window.sessionStorage.setItem(refreshedKey, 'true');
        window.location.reload();
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            registration.update();
          });
        });
      });
    })();
  </script>

  <script>
    (function () {
      var deferredInstallPrompt;
      var installModal = document.getElementById('installModal');
      var installButton = document.getElementById('installBtn');
      var closeButton = document.getElementById('closeInstallBtn');
      var iosInstallSteps = document.getElementById('iosInstallSteps');
      var installSubtitle = document.getElementById('installSubtitle');
      var dismissedKey = 'kalyana-install-prompt-dismissed';
      var isiOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;

      function showInstallModal(isAppleSafari) {
        if (isStandalone || window.localStorage.getItem(dismissedKey) === 'true') {
          return;
        }

        if (isAppleSafari) {
          iosInstallSteps.style.display = 'block';
          installButton.textContent = 'Got it';
          installSubtitle.textContent = 'Install it once to remove the Safari address bar and use the app full screen.';
        }

        installModal.style.display = 'flex';
      }

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        deferredInstallPrompt = event;
        setTimeout(function () {
          showInstallModal(false);
        }, 1200);
      });

      installButton.addEventListener('click', async function () {
        if (deferredInstallPrompt) {
          deferredInstallPrompt.prompt();
          await deferredInstallPrompt.userChoice;
          deferredInstallPrompt = null;
        }

        window.localStorage.setItem(dismissedKey, 'true');
        installModal.style.display = 'none';
      });

      closeButton.addEventListener('click', function () {
        window.localStorage.setItem(dismissedKey, 'true');
        installModal.style.display = 'none';
      });

      if (isiOS && !isStandalone) {
        setTimeout(function () {
          showInstallModal(true);
        }, 1600);
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>

</body>

</html>
